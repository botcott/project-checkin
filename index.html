<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Посещаемость</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json"> <!-- PWA -->
</head>
<body data-theme="light">
    <div id="main-content">
        <!-- Экран Групп -->
        <section id="group-screen" class="screen active">
            <header><h1 class="center-title">Мои Группы</h1></header>
            <div id="group-list" class="grid-list"></div>
        </section>

        <!-- Экран Таблицы -->
        <section id="attendance-screen" class="screen hidden">
            <header>
                <button id="btn-back" class="back-btn-icon">⬅</button>
                <div class="header-center-info">
                    <h1 id="current-group-title" class="center-title">Группа</h1>
                    <select id="month-select" class="month-picker"></select>
                </div>
            </header>
            <div class="table-container">
                <table id="attendance-table">
                    <thead><tr id="header-row"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Нижняя панель -->
    <nav class="dockbar">
        <div class="dock-side">
            <button id="btn-duty-open" class="clean-btn">🧹</button>
        </div>
        <div class="dock-center">
            <button id="btn-main-add" class="circle-add-btn">+</button>
        </div>
        <div class="dock-side">
            <button id="btn-open-settings" class="clean-btn">⚙️</button>
        </div>
    </nav>

    <!-- Окно настроек -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-card">
            <h3>Настройки</h3>
            <button id="btn-theme-toggle" class="ui-btn full-width">Тема 🌓</button>
            
            <div style="margin: 15px 0; padding-top: 10px; border-top: 1px solid var(--border);">
                <button id="btn-install-app" class="ui-btn full-width hidden" style="background:#ffc107; color:#333;">Установить приложение 📲</button>
                <h4 style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 8px; text-transform: uppercase;">Данные</h4>
                <button id="btn-export" class="ui-btn full-width" style="background:#28a745;">Экспорт 📥</button>
                <button id="btn-import" class="ui-btn full-width" style="background:#17a2b8;">Импорт 📤</button>
                <input type="file" id="import-file" style="display:none" accept=".json">
            </div>

            <div class="authors-info">
                <h4>Разработчик:</h4>
                <p>Ахматханов Альберт</p>
                <h4>Дизайнеры:</h4>
                <p>Прокофьев Вадим</p>
                <p>Маркин Илья</p>
                <p>Пермяков Арсений</p>
                <p>Васильев Богдан</p>
                
            </div>

            <div class="social-links">
                <h4>Соц-сети разработчика:</h4>
                <a href="https://t.me/thisnicknamewastaken" target="_blank" class="soc-btn tg">Telegram</a>
                <a href="https://github.com/botcott" target="_blank" class="soc-btn gh">GitHub</a>
            </div>
            
            <button id="btn-close-settings" class="ui-btn full-width secondary">Закрыть</button>
        </div>
    </div>

    <!-- Окно дежурных -->
    <div id="duty-modal" class="modal hidden">
        <div class="modal-card">
            <h3>Дежурные</h3>
            <div id="duty-list-display" style="margin: 20px 0; min-height: 50px;"></div>
            <div style="margin-bottom: 20px;">
                <label style="font-size: 0.8rem; opacity: 0.7;">Количество:</label>
                <input type="number" id="duty-qty" value="2" min="1" max="10" style="width: 50px; padding: 5px; text-align: center; border-radius: 5px; border: 1px solid var(--border);">
            </div>
            <button id="btn-refresh-duty" class="ui-btn full-width">Обновить</button>
            <button id="btn-close-duty" class="ui-btn full-width secondary">Закрыть</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
