<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CheckIn — Журнал посещаемости</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>

<body data-theme="light">
    <div id="main-content">
        <!-- Экран Групп -->
        <section id="group-screen" class="screen active">
            <header>
                <h1 class="center-title">Мои Группы</h1>
            </header>
            <div id="group-list" class="grid-list"></div>
        </section>

        <!-- Экран Таблицы -->
        <section id="attendance-screen" class="screen hidden">
            <header>
                <button id="btn-back" class="back-btn-icon"><i class="fas fa-arrow-left"></i></button>
                <div class="header-center-info">
                    <h1 id="current-group-title" class="center-title">Группа</h1>
                    <select id="month-select" class="month-picker"></select>
                </div>
            </header>
            <div class="table-container">
                <table id="attendance-table">
                    <thead>
                        <tr id="header-row"></tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Нижняя панель -->
    <nav class="dockbar">
        <div class="dock-side">
            <button id="btn-duty-open" class="clean-btn"><i class="fas fa-broom"></i></button>
        </div>
        <div class="dock-center">
            <button id="btn-main-add" class="circle-add-btn"><i class="fas fa-plus"></i></button>
        </div>
        <div class="dock-side">
            <button id="btn-open-settings" class="clean-btn"><i class="fas fa-cog"></i></button>
        </div>
    </nav>

    <!-- Окно настроек -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-card">
            <h3><i class="fas fa-sliders-h" style="margin-right: 8px;"></i>Настройки</h3>
            <button id="btn-theme-toggle" class="ui-btn full-width"><i class="fas fa-sun"></i> Тема <i></button>
            <button id="btn-bogdan-mode-toggle" class="ui-btn full-width"><i class="fas fa-toggle-off"></i> Переключить режим <i></button>

            <div style="margin: 15px 0; padding-top: 10px; border-top: 1px solid var(--border);">
                <button id="btn-install-app" class="ui-btn full-width hidden"><i
                        class="fas fa-download"></i> Установить приложение</button>
                <h4 style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 8px; text-transform: uppercase;">Данные</h4>
                <button id="btn-export" class="ui-btn full-width export"><i
                        class="fas fa-file-export"></i> Экспорт</button>
                <button id="btn-import" class="ui-btn full-width import"><i
                        class="fas fa-file-import"></i> Импорт</button>
                <input type="file" id="import-file" style="display:none" accept=".json">
            </div>

            <div class="authors-info">
                <h4><i class="fas fa-code"></i> Разработчик:</h4>
                <p>Ахматханов Альберт</p>
                <h4><i class="fas fa-paint-brush"></i> Дизайнеры:</h4>
                <p>Прокофьев Вадим, Маркин Илья, Васильев Богдан</p>
            </div>

            <div class="social-links">
                <h4><i class="fas fa-share-alt"></i> Соц-сети:</h4>
                <a href="https://t.me/thisnicknamewastaken" target="_blank" class="soc-btn tg"><i
                        class="fab fa-telegram-plane"></i> Telegram</a>
                <a href="https://github.com/botcott" target="_blank" class="soc-btn gh"><i class="fab fa-github"></i>
                    GitHub</a>
                <a href="https://boosty.to/gitcommit/donate" target="_blank" class="soc-btn don"><i class="fas fa-donate"></i>
                    Donate</a>
            </div>

            <button id="btn-force-update" class="ui-btn btn-secondary">
            <i class="fas fa-sync"></i> <span id="update-btn-text">Проверить обновления</span>
            </button>

            <button id="btn-close-settings" class="ui-btn full-width"><i class="fas fa-times"></i>
                Закрыть</button>
        </div>
    </div>

    <!-- Окно дежурных -->
    <div id="duty-modal" class="modal hidden">
        <div class="modal-card">
            <h3><i class="fas fa-users"></i> Дежурные</h3>
            <div id="duty-list-display" style="margin: 20px 0; min-height: 50px;"></div>
            <div style="margin-bottom: 20px;">
                <label style="font-size: 0.8rem; opacity: 0.7;"><i class="fas fa-sort-amount-up"></i>
                    Количество:</label>
                <input type="number" id="duty-qty" value="2" min="1" max="10"
                    style="width: 50px; padding: 5px; text-align: center; border-radius: 5px; border: 1px solid var(--border);">
            </div>
            <button id="btn-refresh-duty" class="ui-btn full-width"><i class="fas fa-sync-alt"></i> Обновить</button>
            <button id="btn-close-duty" class="ui-btn full-width secondary"><i class="fas fa-times"></i>
                Закрыть</button>
        </div>
    </div>

    <!-- Окно помощи -->
    <div id="duty-modal" class="modal hidden">
        <div class="modal-card">
            <h3><i class="fas fa-users"></i> Дежурные</h3>
            <div id="duty-list-display" style="margin: 20px 0; min-height: 50px;"></div>
            <div style="margin-bottom: 20px;">
                <label style="font-size: 0.8rem; opacity: 0.7;"><i class="fas fa-sort-amount-up"></i>
                    Количество:</label>
                <input type="number" id="duty-qty" value="2" min="1" max="10"
                    style="width: 50px; padding: 5px; text-align: center; border-radius: 5px; border: 1px solid var(--border);">
            </div>
            <button id="btn-refresh-duty" class="ui-btn full-width"><i class="fas fa-sync-alt"></i> Обновить</button>
            <button id="btn-close-duty" class="ui-btn full-width secondary"><i class="fas fa-times"></i>
                Закрыть</button>
        </div>
    </div>

    <!-- КАСТОМНОЕ ОКНО ВВОДА (Prompt) -->
    <div id="custom-prompt-modal" class="modal hidden">
        <div class="modal-card" style="max-width: 300px;">
            <h3 id="prompt-title"><i class="fas fa-pencil-alt"></i> Ввод</h3>
            <input type="text" id="prompt-input" class="prompt-input-field" placeholder="Введите значение..."
                autocomplete="off">
            <div class="prompt-error" id="prompt-error"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="prompt-confirm" class="ui-btn" style="flex: 1; margin: 0;"><i class="fas fa-check"></i>
                    ОК</button>
                <button id="prompt-cancel" class="ui-btn secondary" style="flex: 1; margin: 0;"><i
                        class="fas fa-times"></i> Отмена</button>
            </div>
        </div>
    </div>

    <!-- КАСТОМНОЕ ОКНО ПОДТВЕРЖДЕНИЯ (Confirm) -->
    <div id="custom-confirm-modal" class="modal hidden">
        <div class="modal-card" style="max-width: 300px;">
            <h3 id="confirm-title"><i class="fas fa-question-circle"></i> Подтверждение</h3>
            <p id="confirm-message" style="margin: 15px 0; word-break: break-word;">Вы уверены?</p>
            <div style="display: flex; gap: 10px;">
                <button id="confirm-yes" class="ui-btn" style="flex: 1; margin: 0; background: var(--n-color);"><i
                        class="fas fa-check"></i> Да</button>
                <button id="confirm-no" class="ui-btn secondary" style="flex: 1; margin: 0;"><i
                        class="fas fa-times"></i> Нет</button>
            </div>
        </div>
    </div>

    <!-- КАСТОМНОЕ ОКНО АЛЕРТА (Alert) -->
    <div id="custom-alert-modal" class="modal hidden">
        <div class="modal-card" style="max-width: 300px;">
            <h3 id="alert-title"><i class="fas fa-question-circle"></i> Подтверждение</h3>
            <div style="display: flex; gap: 10px;">
                <button id="alert-yes" class="ui-btn" style="flex: 1; margin: 0; background: var(--n-color);"><i
                        class="fas fa-check"></i> Понятно</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
